<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Portal R</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo">R</div>
        <h2>Acesso ao Portal</h2>
        <p>Identifique-se para prosseguir</p>

        <!-- Exibe mensagens de erro (ex: senha incorreta) -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alerta-erro">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <input type="email" name="email" placeholder="E-mail cadastrado" required>
            <input type="password" name="senha" placeholder="Sua Senha" required>
            <button type="submit" class="btn-principal">Entrar no Portal</button>
        </form>

        <p class="link-troca">Ainda não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se aqui</a></p>
        <hr>
        <a href="{{ url_for('index') }}" class="link-voltar">Voltar ao Início</a>
    </div>
</body>
</html>
