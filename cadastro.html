<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Portal R</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo">R</div>
        <h2>Criar Conta de Membro</h2>
        <p>Junte-se à nossa comunidade de fé</p>
        
        <form action="{{ url_for('cadastro') }}" method="POST">
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="email" name="email" placeholder="Seu melhor E-mail" required>
            <input type="password" name="senha" placeholder="Crie uma Senha" required>
            <button type="submit" class="btn-principal">Finalizar Cadastro</button>
        </form>
        
        <p class="link-troca">Já é membro? <a href="{{ url_for('login') }}">Entrar agora</a></p>
    </div>
</body>
</html>
