<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Ágape</title>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .mine { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .others { align-self: flex-start; background: white; border-top-left-radius: 0; }
        .user { font-size: 0.7em; font-weight: bold; color: #075e54; display: block; }
        .time { font-size: 0.6em; color: #999; float: right; margin-top: 4px; margin-left: 8px; }
        footer { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
    </style>
</head>
<body>
    <header>⛪ Chat Ágape - Sala: {{ room }}</header>
    <div id="chat-box">
        {% for m in history %}
        <div class="bubble {{ 'mine' if m.user == user else 'others' }}">
            <span class="user">{{ m.user }}</span>
            {{ m.text }}
            <span class="time">{{ m.time }}</span>
        </div>
        {% endfor %}
    </div>
    <footer>
        <form id="chat-form" style="display: flex; width: 100%; gap: 10px;">
            <input type="text" id="msg-input" placeholder="Digite sua mensagem..." autocomplete="off">
            <button type="submit">➤</button>
        </form>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const user = "{{ user }}";
        const room = "{{ room }}";
        chatBox.scrollTop = chatBox.scrollHeight;

        // Receber mensagens em tempo real
        const source = new EventSource(`/stream/${room}`);
        source.onmessage = function(e) {
            const data = JSON.parse(e.data);
            if(data.status) return;

            const div = document.createElement('div');
            const isMine = data.user === user;
            div.className = `bubble ${isMine ? 'mine' : 'others'}`;
            div.innerHTML = `<span class="user">${data.user}</span>${data.text}<span class="time">${data.time}</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        // Enviar mensagem
        document.getElementById('chat-form').onsubmit = function(e) {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if(!input.value) return;

            const fd = new FormData();
            fd.append('message', input.value);
            fd.append('user', user);
            fd.append('room', room);

            fetch('/post', { method: 'POST', body: fd });
            input.value = '';
        };
    </script>
</body>
</html>
