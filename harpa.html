<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Harpa Cristã - Portal R</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="logo">R</div>
        <nav><a href="{{ url_for('index') }}">Voltar ao Início</a></nav>
    </header>

    <main class="container-central">
        <h1>Harpa Cristã</h1>
        
        <input type="text" id="buscaHino" placeholder="Digite o número ou título..." onkeyup="filtrarHinos()">

        <div id="visor-letra" class="visor-letra" style="display:none;">
            <button onclick="fecharLetra()" class="btn-fechar">×</button>
            <h2 id="hino-titulo"></h2>
            <pre id="hino-texto"></pre>
        </div>

        <div class="lista-hinos" id="lista-hinos">
            {% for hino in hinos %}
            <div class="item-hino" onclick="abrirHino('{{ hino.numero }}', '{{ hino.titulo }}', `{{ hino.letra }}`)">
                <span class="num-h">{{ hino.numero }}</span> {{ hino.titulo }}
            </div>
            {% endfor %}
        </div>
    </main>

    <script>
        function abrirHino(num, titulo, letra) {
            document.getElementById('hino-titulo').innerText = num + " - " + titulo;
            document.getElementById('hino-texto').innerText = letra;
            document.getElementById('visor-letra').style.display = 'block';
            window.scrollTo(0,0);
        }

        function fecharLetra() {
            document.getElementById('visor-letra').style.display = 'none';
        }

        function filtrarHinos() {
            let input = document.getElementById('buscaHino').value.toLowerCase();
            let itens = document.getElementsByClassName('item-hino');
            for (let i = 0; i < itens.length; i++) {
                itens[i].style.display = itens[i].innerText.toLowerCase().includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
