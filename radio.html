<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rádios Cristãs - Portal R</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="logo">R</div>
        <nav>
            <ul>
                <li><a href="{{ url_for('index') }}">Início</a></li>
                <li><a href="{{ url_for('comunidade') }}">Bate-Papo</a></li>
                <li><a href="{{ url_for('sair') }}">Sair</a></li>
            </ul>
        </nav>
    </header>

    <main class="container-central">
        <section class="header-secao">
            <h1>Rádios Cristãs ao Vivo</h1>
            <p>O melhor do louvor e da palavra em tempo real.</p>
        </section>

        <div class="grid-radios">
            <!-- Rádio 1 -->
            <div class="card-radio">
                <div class="radio-info">
                    <h3>Rádio Melodia 97.5 FM</h3>
                    <span>Rio de Janeiro / RJ</span>
                </div>
                <audio controls preload="none">
                    <source src="https://stream.melodia.com.br" type="audio/mpeg">
                    Seu navegador não suporta áudio.
                </audio>
            </div>

            <!-- Rádio 2 -->
            <div class="card-radio">
                <div class="radio-info">
                    <h3>Rádio 93 FM</h3>
                    <span>Rio de Janeiro / RJ</span>
                </div>
                <audio controls preload="none">
                    <source src="https://stream.radio93.com.br" type="audio/mpeg">
                </audio>
            </div>

            <!-- Rádio 3 -->
            <div class="card-radio">
                <div class="radio-info">
                    <h3>Gospel FM 90.1</h3>
                    <span>São Paulo / SP</span>
                </div>
                <audio controls preload="none">
                    <source src="https://stream.gospelfm.com.br" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </main>

    <footer class="rodape">
        <p>&copy; 2024 Portal R - Conectando Irmãos em Cristo</p>
    </footer>
</body>
</html>
