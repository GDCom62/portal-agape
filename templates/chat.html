<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ágape Premium</title>
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #4f46e5; --bg: #0f172a; --card: #1e293b; --text: #ffffff; --logo-url: url('/logo.png'); }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        header { padding: 10px 20px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .logo-header { height: 35px; margin-right: 10px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { background: #334155; padding: 12px 15px; border-radius: 15px; max-width: 80%; position: relative; padding-left: 55px; min-height: 40px; }
        .msg::before { content: ""; position: absolute; left: 10px; top: 12px; width: 35px; height: 35px; background: var(--logo-url) center/contain no-repeat; background-color: #fff; border-radius: 50%; }
        #video-window { position: fixed; top: 70px; right: 20px; width: 300px; height: 200px; background: #000; border-radius: 10px; display: none; z-index: 999; border: 2px solid var(--primary); }
        #controls { background: var(--card); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input[type="text"] { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 12px; border-radius: 20px; color: #fff; outline: none; }
        .btn { border: none; cursor: pointer; color: white; border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 5px; }
        .btn-video { background: #22c55e; } .btn-send { background: var(--primary); } .btn-file { background: #64748b; }
    </style>
</head>
<body>

<header>
    <div><img src="/logo.png" class="logo-header"> <b style="color:var(--primary)">ÁGAPE</b></div>
    <button class="btn btn-video" onclick="toggleVideo()"><i class="fas fa-video"></i> VÍDEO</button>
</header>

<div id="video-window">
    <div style="background:#1e293b; padding:5px; font-size:10px; display:flex; justify-content:space-between;">
        <span>AO VIVO</span><i class="fas fa-times" onclick="toggleVideo()" style="cursor:pointer"></i>
    </div>
    <div id="jitsi-container" style="height: calc(100% - 25px);"></div>
</div>

<div id="chat-box">
    {% for m in history %}
    <div class="msg"><b>{{ m.user }}</b><span>{{ m.text|safe }}</span></div>
    {% endfor %}
</div>

<div id="controls">
    <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()">
    <button class="btn btn-file" onclick="document.getElementById('fileInput').click()"><i class="fas fa-paperclip"></i></button>
    <input type="text" id="messageInput" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button class="btn btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
</div>

<script src="https://jit.si"></script>
<script>
    const socket = io();
    const user = "{{ user }}";
    const room = "{{ room }}";
    let api = null;

    function toggleVideo() {
        const win = document.getElementById('video-window');
        if (win.style.display === 'none' || win.style.display === '') {
            win.style.display = 'block';
            api = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Agape_" + room, parentNode: document.getElementById('jitsi-container'), userInfo: { displayName: user } });
        } else { win.style.display = 'none'; if(api) api.dispose(); }
    }

    function sendMessage() {
        const msg = document.getElementById('messageInput').value;
        if(msg.trim()) { socket.emit('send_message', {user, room, message: msg}); document.getElementById('messageInput').value = ''; }
    }

    async function uploadFile() {
        const fd = new FormData();
        fd.append('file', document.getElementById('fileInput').files[0]);
        fd.append('user', user); fd.append('room', room);
        await fetch('/upload', {method: 'POST', body: fd});
    }

    socket.on('receive_message', (data) => {
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${data.user}</b><span>${data.text}</span>`;
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    });
</script>
</body>
</html>
