<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Comunidade - Portal R</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="logo">R</div>
        <nav><a href="{{ url_for('index') }}">Voltar ao Início</a></nav>
    </header>

    <main class="container-chat">
        <h2>Bate-papo da Comunidade</h2>
        <div id="janela-mensagens" class="chat-box">
            {% for msg in historico %}
                <div class="{{ 'msg-minha' if msg.usuario_nome == current_user.nome else 'msg-outra' }}">
                    <small>{{ msg.usuario_nome }}</small>
                    <p>{{ msg.texto }}</p>
                </div>
            {% endfor %}
        </div>

        <div class="input-chat">
            <input type="text" id="msg-input" placeholder="Digite sua mensagem de fé...">
            <button onclick="enviar()">Enviar</button>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com"></script>
    <script>
        const socket = io();
        const nomeUsuario = "{{ current_user.nome }}";

        socket.on('receber_mensagem', (data) => {
            const div = document.createElement('div');
            div.className = data.usuario === nomeUsuario ? 'msg-minha' : 'msg-outra';
            div.innerHTML = `<small>${data.usuario}</small><p>${data.texto}</p>`;
            document.getElementById('janela-mensagens').appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        });

        function enviar() {
            const input = document.getElementById('msg-input');
            if(input.value) {
                socket.emit('enviar_mensagem', {usuario: nomeUsuario, texto: input.value});
                input.value = '';
            }
        }
    </script>
    <script>
        const socket = io();
        const nomeUsuario = "{{ current_user.nome }}";
        const janela = document.getElementById('janela-mensagens');
    
        // Rolar para o fim ao carregar a página
        janela.scrollTop = janela.scrollHeight;
    
        socket.on('receber_mensagem', (data) => {
            const div = document.createElement('div');
            // Define se a mensagem é minha ou de outro irmão
            div.className = data.usuario === nomeUsuario ? 'msg-minha' : 'msg-outra';
            div.innerHTML = `<small>${data.usuario}</small><p>${data.texto}</p>`;
            
            janela.appendChild(div);
            janela.scrollTop = janela.scrollHeight; // Rola sempre para a última mensagem
        });
    
        function enviar() {
            const input = document.getElementById('msg-input');
            if(input.value.trim() !== "") {
                socket.emit('enviar_mensagem', {
                    usuario: nomeUsuario, 
                    texto: input.value
                });
                input.value = '';
            }
        }
    
        // Enviar ao apertar "Enter"
        document.getElementById('msg-input').addEventListener("keyup", function(event) {
            if (event.key === "Enter") { enviar(); }
        });
    </script>
    
</body>
</html>
