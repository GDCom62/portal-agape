{% extends "base.html" %}
{% block content %}
<div class="container chat-container">
    <header class="chat-header">
        <h1 class="logo-mini">A</h1>
        <h2>Crescendo em Comunhão</h2>
        <p>Espaço exclusivo para troca de mensagens, saudações e edificação entre os membros.</p>
    </header>

    <div class="chat-wrapper">
        <!-- Janela de Mensagens -->
        <div id="chat-window">
            {% for msg in historico %}
                <div class="msg-card {% if msg.usuario_nome == current_user.nome %}minha-msg{% endif %}">
                    <div class="msg-info">
                        <span class="msg-autor">{{ msg.usuario_nome }}</span>
                        <span class="msg-data">{{ msg.data_envio.strftime('%H:%M') }}</span>
                    </div>
                    <p class="msg-texto">{{ msg.texto }}</p>
                </div>
            {% endfor %}
        </div>

        <!-- Área de Digitação -->
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Digite sua mensagem de fé..." autocomplete="off">
            <button id="send-btn">
                <span class="icon-send">➤</span> Enviar
            </button>
        </div>
    </div>
</div>

<!-- Importação do Socket.io -->
<script src="https://cloudflare.com"></script>
<script>
    var socket = io();
    var chatWindow = document.getElementById('chat-window');
    var chatInput = document.getElementById('chat-input');
    var sendBtn = document.getElementById('send-btn');

    // Scroll para o fim da conversa ao carregar
    chatWindow.scrollTop = chatWindow.scrollHeight;

    // Função para enviar mensagem
    function enviarMensagem() {
        var texto = chatInput.value.trim();
        if (texto !== "") {
            socket.emit('enviar_mensagem', {
                'usuario': "{{ current_user.nome }}",
                'texto': texto
            });
            chatInput.value = "";
        }
    }

    // Clique no botão ou Tecla Enter
    sendBtn.onclick = enviarMensagem;
    chatInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            enviarMensagem();
        }
    });

    // Receber mensagem do servidor
    socket.on('receber_mensagem', function(data) {
        var div = document.createElement('div');
        var isMinha = data.usuario === "{{ current_user.nome }}";
        
        div.className = 'msg-card' + (isMinha ? ' minha-msg' : '');
        div.innerHTML = `
            <div class="msg-info">
                <span class="msg-autor">${data.usuario}</span>
                <span class="msg-data">${new Date().getHours()}:${new Date().getMinutes()}</span>
            </div>
            <p class="msg-texto">${data.texto}</p>
        `;
        
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight; // Auto-scroll
    });
</script>

<style>
    .chat-container { padding: 30px 0; max-width: 800px; }
    .chat-header { margin-bottom: 30px; }
    
    .chat-wrapper {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        overflow: hidden;
        border-top: 5px solid var(--ouro);
    }

    #chat-window {
        height: 500px;
        overflow-y: auto;
        padding: 25px;
        background: #fdfaf5;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* Estilo dos Balões de Mensagem */
    .msg-card {
        max-width: 80% ;
        padding: 12px 18px;
        border-radius: 15px 15px 15px 2px;
        background: white;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        align-self: flex-start;
        text-align: left;
    }

    .minha-msg {
        align-self: flex-end;
        background: var(--primaria);
        color: white;
        border-radius: 15px 15px 2px 15px;
        border-right: 4px solid var(--ouro);
    }

    .msg-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.75rem; }
    .msg-autor { font-weight: bold; color: var(--ouro); }
    .minha-msg .msg-autor { color: var(--ouro); }
    .msg-data { opacity: 0.6; margin-left: 10px; }
    .msg-texto { margin: 0; line-height: 1.4; word-wrap: break-word; }

    /* Área de Input */
    .chat-input-area {
        padding: 20px;
        background: white;
        display: flex;
        gap: 10px;
        border-top: 1px solid #eee;
    }

    #chat-input {
        flex: 1;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 30px;
        outline: none;
        transition: 0.3s;
    }

    #chat-input:focus { border-color: var(--ouro); box-shadow: 0 0 5px rgba(212,175,55,0.3); }

    #send-btn {
        background: var(--primaria);
        color: var(--ouro);
        border: none;
        padding: 0 25px;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    #send-btn:hover { background: #2c3e50; transform: scale(1.05); }

    /* Barra de Scroll */
    #chat-window::-webkit-scrollbar { width: 6px; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--ouro); border-radius: 10px; }

    @media (max-width: 600px) {
        #chat-window { height: 400px; padding: 15px; }
        .msg-card { max-width: 90%; }
    }
</style>
{% endblock %}
